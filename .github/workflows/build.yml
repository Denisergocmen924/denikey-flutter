name: DeniKey Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - name: Versiyon belirle
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "number=${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Keystore oluştur
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/denikey.keystore
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=denikey.keystore
          EOF
      - run: flutter build apk --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - run: flutter build appbundle --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - name: Dosyaları yeniden adlandır
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk DeniKey-Android.apk
          cp build/app/outputs/bundle/release/app-release.aab DeniKey-Android.aab
      - name: GitHub Release'e yükle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: DeniKey ${{ github.ref_name }}
          draft: true
          body: |
            ## DeniKey ${{ github.ref_name }}

            ### İndirme Linkleri
            | Platform | Dosya |
            |----------|-------|
            | Android | `DeniKey-Android.apk` |
            | Windows | `DeniKey-Setup.exe` |
            | Ubuntu | `DeniKey-Linux.deb` |

            ### Kurulum
            - **Android:** APK'yı indir, "Bilinmeyen kaynaklardan yükle" izni ver, kur.
            - **Windows:** `DeniKey-Setup.exe` dosyasını indir ve çalıştır.
            - **Ubuntu:** `DeniKey-Linux.deb` dosyasını indir, çift tıkla ve "Kur" de.
          files: |
            DeniKey-Android.apk
            DeniKey-Android.aab

  build-windows:
    name: Windows EXE
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Git long path desteği
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - name: Versiyon belirle
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $pubspec = Get-Content pubspec.yaml -Raw
            $v = [regex]::Match($pubspec, '(?m)^version:\s*([^\+\r\n]+)').Groups[1].Value.Trim()
          }
          echo "name=$v" >> $env:GITHUB_OUTPUT
          echo "number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
      - run: flutter build windows --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - name: Kurulum scriptini kopyala ve EXE yeniden adlandır
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $exePath = "$releaseDir\denikey_app.exe"
          if (Test-Path $exePath) {
            Rename-Item $exePath "DeniKey.exe"
          }
          if (Test-Path "windows_setup\install.ps1") {
            Copy-Item "windows_setup\install.ps1" "$releaseDir\install.ps1"
          }
      - name: Inno Setup kur
        run: choco install innosetup --yes
      - name: Installer oluştur
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.name }}"
          Write-Host "Building installer version: $version"
          New-Item -ItemType Directory -Force -Path "windows_setup\installer_output" | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "windows_setup\installer.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: GitHub Release'e yükle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: windows_setup/installer_output/DeniKey-Setup.exe

  build-linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Linux bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            libnotify-dev libayatana-appindicator3-dev \
            libpam0g-dev network-manager-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - name: Versiyon belirle
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "number=${{ github.run_number }}" >> $GITHUB_OUTPUT
      - run: flutter build linux --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - name: .deb paketi oluştur
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          PKG="denikey_${VERSION}_amd64"

          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/opt/denikey"
          mkdir -p "$PKG/usr/bin"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"

          cp -r build/linux/x64/release/bundle/. "$PKG/opt/denikey/"
          cp linux/denikey.png "$PKG/usr/share/icons/hicolor/256x256/apps/denikey.png"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=DeniKey' \
            'Comment=Zero-knowledge şifre yöneticisi' \
            'Exec=/opt/denikey/DeniKey' \
            'Icon=denikey' \
            'Type=Application' \
            'Categories=Utility;Security;' \
            'StartupWMClass=DeniKey' \
            'Terminal=false' \
            'Path=/opt/denikey' \
            > "$PKG/usr/share/applications/denikey.desktop"

          ln -s /opt/denikey/DeniKey "$PKG/usr/bin/denikey"

          printf '%s\n' \
            'Package: denikey' \
            "Version: $VERSION" \
            'Architecture: amd64' \
            'Maintainer: Denis Ergocmen <denisergocmen@gmail.com>' \
            'Description: Zero-knowledge şifre yöneticisi' \
            ' DeniKey, sıfır-bilgi şifreleme ile çalışan çapraz platform bir şifre yöneticisidir.' \
            'Depends: libgtk-3-0, libsecret-1-0, libnotify4, libayatana-appindicator3-1' \
            > "$PKG/DEBIAN/control"

          dpkg-deb --build "$PKG" "DeniKey-Linux.deb"
      - name: GitHub Release'e yükle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: DeniKey-Linux.deb

  publish-release:
    name: Release Yayınla
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Draft release'i yayınla
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish-to-public:
    name: Public Repoya Kopyala
    needs: [publish-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Release dosyalarını indir
        run: |
          gh release download ${{ github.ref_name }} \
            --pattern "DeniKey-Android.apk" \
            --pattern "DeniKey-Setup.exe" \
            --pattern "DeniKey-Linux.deb"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: denikey-releases reposuna yükle
        run: |
          gh release delete ${{ github.ref_name }} \
            --repo Denisergocmen924/denikey-releases \
            --yes 2>/dev/null || true
          gh release create ${{ github.ref_name }} \
            DeniKey-Android.apk \
            DeniKey-Setup.exe \
            DeniKey-Linux.deb \
            --repo Denisergocmen924/denikey-releases \
            --title "DeniKey ${{ github.ref_name }}" \
            --notes "DeniKey ${{ github.ref_name }} sürümü"
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
