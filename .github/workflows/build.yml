name: DeniKey Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - name: Versiyon belirle
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "number=${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Keystore oluştur
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/denikey.keystore
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=denikey.keystore
          EOF
      - run: flutter build apk --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - run: flutter build appbundle --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: DeniKey-Android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Git long path desteği
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - name: Versiyon belirle
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $pubspec = Get-Content pubspec.yaml -Raw
            $v = [regex]::Match($pubspec, '(?m)^version:\s*([^\+\r\n]+)').Groups[1].Value.Trim()
          }
          echo "name=$v" >> $env:GITHUB_OUTPUT
          echo "number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
      - run: flutter build windows --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - name: Kurulum scriptini kopyala ve EXE yeniden adlandır
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $exePath = "$releaseDir\denikey_app.exe"
          if (Test-Path $exePath) {
            Rename-Item $exePath "DeniKey.exe"
          }
          if (Test-Path "windows_setup\install.ps1") {
            Copy-Item "windows_setup\install.ps1" "$releaseDir\install.ps1"
          }
      - name: Inno Setup kur
        run: choco install innosetup --yes
      - name: Installer oluştur
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.name }}"
          Write-Host "Building installer version: $version"
          New-Item -ItemType Directory -Force -Path "windows_setup\installer_output" | Out-Null
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $turkishIsl = "C:\Program Files (x86)\Inno Setup 6\Languages\Turkish.isl"
          if (-not (Test-Path $turkishIsl)) {
            Write-Host "Turkish.isl bulunamadi, indiriliyor..."
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Turkish.isl" -OutFile $turkishIsl
          }
          & $isccPath "/DMyAppVersion=$version" "windows_setup\installer.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: DeniKey-Windows
          path: windows_setup\installer_output\DeniKey-Setup.exe

  build-linux:
    name: Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Linux bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            libnotify-dev libayatana-appindicator3-dev \
            libpam0g-dev network-manager-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - name: Versiyon belirle
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "number=${{ github.run_number }}" >> $GITHUB_OUTPUT
      - run: flutter build linux --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.number }}
      - name: Linux tar.gz oluştur
        run: |
          tar -czf DeniKey-Linux.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: DeniKey-Linux
          path: DeniKey-Linux.tar.gz

  release:
    name: GitHub Release
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Android artifact indir
        uses: actions/download-artifact@v4
        with:
          name: DeniKey-Android
          path: release-files/
      - name: Windows artifact indir
        uses: actions/download-artifact@v4
        with:
          name: DeniKey-Windows
          path: release-files/
      - name: Linux artifact indir
        uses: actions/download-artifact@v4
        with:
          name: DeniKey-Linux
          path: release-files/
      - name: Dosyaları yeniden adlandır
        run: |
          find release-files -name "app-release.apk" -exec mv {} release-files/DeniKey-Android.apk \;
          find release-files -name "app-release.aab" -exec mv {} release-files/DeniKey-Android.aab \;
      - name: GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          name: DeniKey ${{ github.ref_name }}
          body: |
            ## DeniKey ${{ github.ref_name }}

            ### İndirme Linkleri
            | Platform | Dosya |
            |----------|-------|
            | Android | `DeniKey-Android.apk` |
            | Windows | `DeniKey-Setup.exe` |
            | Linux | `DeniKey-Linux.tar.gz` |

            ### Kurulum
            - **Android:** APK'yı indir, "Bilinmeyen kaynaklardan yükle" izni ver, kur.
            - **Windows:** `DeniKey-Setup.exe` dosyasını indir ve çalıştır.
            - **Linux:** `tar -xzf DeniKey-Linux.tar.gz` ile aç, `DeniKey` binary'sini çalıştır.
          files: |
            release-files/DeniKey-Android.apk
            release-files/DeniKey-Android.aab
            release-files/DeniKey-Setup.exe
            release-files/DeniKey-Linux.tar.gz
          draft: false
          prerelease: false
