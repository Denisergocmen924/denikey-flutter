name: DeniKey Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: DeniKey-Android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Git long path desteği
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Kurulum scriptini kopyala ve EXE yeniden adlandır
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $exePath = "$releaseDir\denikey_app.exe"
          if (Test-Path $exePath) {
            Rename-Item $exePath "DeniKey.exe"
          }
          if (Test-Path "windows_setup\install.ps1") {
            Copy-Item "windows_setup\install.ps1" "$releaseDir\install.ps1"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: DeniKey-Windows
          path: build/windows/x64/runner/Release/

  build-linux:
    name: Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Linux bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: DeniKey-Linux
          path: build/linux/x64/release/bundle/
