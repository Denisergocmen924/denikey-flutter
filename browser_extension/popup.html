<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      background: #FF5900;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      color: white;
    }
    .content { padding: 16px; }
    .status {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      text-align: center;
    }
    .status.ok { background: #1e3a2e; color: #4caf50; }
    .status.locked { background: #3a2a1e; color: #FF5900; }
    .status.offline { background: #2a2a2a; color: #888; }
    .token-section { margin-top: 12px; }
    .token-section label { font-size: 11px; color: #888; display: block; margin-bottom: 6px; }
    .token-section input {
      width: 100%;
      padding: 7px 10px;
      background: #2a2a4e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
    }
    .btn {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      background: #FF5900;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #e04d00; }
    .hint { font-size: 11px; color: #666; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">🔑 DeniKey Autofill</div>
  <div class="content">
    <div id="status" class="status offline">Kontrol ediliyor...</div>

    <div class="token-section">
      <label>Bağlantı Token'ı (DeniKey → Ayarlar → Autofill)</label>
      <input type="text" id="tokenInput" placeholder="Token girin" />
    </div>
    <button class="btn" id="saveBtn">Kaydet &amp; Bağlan</button>
    <div class="hint">DeniKey açık ve giriş yapılmış olmalıdır.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
