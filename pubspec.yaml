name: denikey_app
description: "DeniKey - Sıfır bilgi mimarisiyle güvenli şifre yöneticisi."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.4
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  cupertino_icons: ^1.0.8
  pointycastle: ^3.9.1
  cryptography: ^2.7.0
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4
  connectivity_plus: ^6.0.3
  path: ^1.9.0
  device_info_plus: ^12.4.0
  local_auth: ^2.3.0
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^18.0.0
  window_manager: ^0.3.9
  url_launcher: ^6.3.0
  package_info_plus: ^8.1.3
  tray_manager: ^0.2.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
flutter:
  uses-material-design: true
  assets:
    - assets/icon/denikey_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/denikey_logo.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  linux:
    generate: false
